name: LifeFlow CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── CI: Test & Checks ────────────────────────────────────────────
  test:
    name: ✅ Run Tests & Checks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔍 Check server.js syntax
        run: node --check server.js

      - name: 🔍 Check script.js syntax
        run: node --check public/js/script.js

      - name: ✅ Verify required files exist
        run: |
          echo "Checking required project files..."
          test -f server.js          && echo "✅ server.js found"       || exit 1
          test -f package.json       && echo "✅ package.json found"    || exit 1
          test -f public/index.html  && echo "✅ index.html found"      || exit 1
          test -f public/portal.html && echo "✅ portal.html found"     || exit 1
          echo "✅ All required files present!"

      - name: 📋 Show Node and npm version
        run: |
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"

      - name: 🎉 CI Complete - Railway auto-deploys from GitHub
        run: |
          echo "✅ All checks passed!"
          echo "🚀 Railway will now auto-deploy from GitHub"
          echo "🌐 Live at: https://lifeflow-production-bf1f.up.railway.app"
